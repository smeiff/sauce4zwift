<!DOCTYPE html>
<html class="hidden-during-load" tabindex="0">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
        <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>

        <title>Heart Rate Gauge - Sauce for Zwift™</title>

        <script src="../src/preloads.js"></script>

        <link rel="manifest" href="hr-manifest.json"/>
        <link id="favicon" rel="shortcut icon" href="../images/favicon.png"/>
        <link rel="stylesheet" href="../css/common.css"/>
        <link rel="stylesheet" href="../css/gauge.css"/>

        <style>
            #content {
                display: flex;
                flex-direction: column;
                height: 100vh;
                width: 100vw;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .simple-gauge {
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 100%;
            }
            .gauge-bar-track {
                width: 100%;
                height: 8px;
                background: rgba(255, 255, 255, 0.1);
            }
            .gauge-bar-fill {
                height: 100%;
                width: 0%;
                background-color: var(--gauge-color, #a0a0a0);
                transition: width 0.2s ease-out, background-color 0.2s ease;
            }
            .gauge-data {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 10px;
            }
            .gauge-value {
                font-size: 35vmin;
                font-weight: bold;
                line-height: 1;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            }
            .gauge-label {
                font-size: 8vmin;
                opacity: 0.6;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-top: 5px;
            }
        </style>

        <script type="module">
            import {main} from '../src/gauge.mjs';
            main();
        </script>

    </head>
    <body class="transparent-bg">
        <div id="titlebar">
            <header>
                <div class="title">Heart Rate Gauge</div>
                <div class="filler"></div>
                <div class="buttons">
                    <a class="button open-settings" href="settings.html?width=420&height=460&child-window"
                       title="Open settings window" target="gauge-settings"><ms>settings</ms></a>
                    <div title="Minimize" class="button minimize electron-only"><ms>minimize</ms></div>
                    <div title="Close this window" class="button close electron-only"><ms>close</ms></div>
                </div>
            </header>
        </div>
        <div id="content">
            <div class="simple-gauge">
                <div class="gauge-bar-track">
                    <div class="gauge-bar-fill" id="gauge-fill"></div>
                </div>
                <div class="gauge-data">
                    <div class="gauge-value" id="gauge-value">--</div>
                    <div class="gauge-label">Heart Rate</div>
                </div>
            </div>
        </div>
        <div id="hintbar">
            <div class="hint"></div>
        </div>
    </body>
</html>
